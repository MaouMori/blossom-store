<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#050305">
  <title>Blossom Store - Livro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html,
    body.book-page-body {
      background: #050305 !important;
      overflow-x: hidden;
      scrollbar-gutter: stable;
    }

    html {
      overflow-y: scroll;
    }

    .book-page-body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 50% 46%, rgba(255, 105, 164, 0.28), transparent 34rem),
        radial-gradient(circle at 12% 58%, rgba(255, 105, 164, 0.18), transparent 26rem),
        radial-gradient(circle at 86% 62%, rgba(255, 105, 164, 0.2), transparent 24rem),
        radial-gradient(circle at 50% 96%, rgba(255, 132, 182, 0.18), transparent 34rem),
        linear-gradient(180deg, #060305, #10060b 48%, #040203);
      color: #fff;
      font-family: "Archivo", sans-serif;
      overflow-x: hidden;
    }

    .book-page-body.editorial-light {
      background:
        radial-gradient(circle at 50% 46%, rgba(255, 105, 164, 0.18), transparent 34rem),
        radial-gradient(circle at 12% 58%, rgba(255, 105, 164, 0.12), transparent 26rem),
        radial-gradient(circle at 86% 62%, rgba(255, 105, 164, 0.14), transparent 24rem),
        linear-gradient(180deg, #fff8fb, #ffeaf2 48%, #fff7fa) !important;
      color: #251017;
    }

    .book-page-body::before,
    .book-page-body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .book-page-body::before {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.55), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.55)),
        radial-gradient(ellipse at center, transparent 0 28%, rgba(0, 0, 0, 0.34) 70%, rgba(0, 0, 0, 0.78) 100%),
        repeating-radial-gradient(circle at 50% 48%, rgba(255, 137, 183, 0.09) 0 1px, transparent 1px 58px);
      opacity: 1;
    }

    .book-page-body.editorial-light::before {
      background:
        linear-gradient(90deg, rgba(255, 248, 251, 0.48), transparent 24%, transparent 76%, rgba(255, 248, 251, 0.48)),
        radial-gradient(ellipse at center, transparent 0 28%, rgba(218, 74, 123, 0.1) 70%, rgba(218, 74, 123, 0.18) 100%),
        repeating-radial-gradient(circle at 50% 48%, rgba(218, 74, 123, 0.08) 0 1px, transparent 1px 58px);
    }

    .book-page-body.editorial-light::after {
      opacity: 0.42;
    }

    .book-page-body::after {
      background:
        radial-gradient(ellipse at 7% 38%, rgba(255, 132, 182, 0.28) 0 8px, transparent 9px),
        radial-gradient(ellipse at 12% 63%, rgba(255, 132, 182, 0.28) 0 9px, transparent 10px),
        radial-gradient(ellipse at 90% 45%, rgba(255, 132, 182, 0.24) 0 8px, transparent 9px),
        radial-gradient(ellipse at 87% 78%, rgba(255, 132, 182, 0.3) 0 10px, transparent 11px),
        radial-gradient(ellipse at 25% 84%, rgba(255, 132, 182, 0.2) 0 5px, transparent 6px),
        radial-gradient(ellipse at 42% 22%, rgba(255, 132, 182, 0.18) 0 5px, transparent 6px),
        radial-gradient(ellipse at 62% 86%, rgba(255, 132, 182, 0.22) 0 7px, transparent 8px),
        linear-gradient(125deg, transparent 0 18%, rgba(255, 105, 164, 0.055) 22%, transparent 34% 100%),
        linear-gradient(35deg, transparent 0 58%, rgba(255, 105, 164, 0.055) 64%, transparent 78% 100%);
      filter: blur(0.15px);
      opacity: 1;
    }

    .editorial-header {
      z-index: 20;
      background: linear-gradient(180deg, rgba(5, 3, 5, 0.84), transparent);
      border-bottom: 0;
    }

    .book-main {
      position: relative;
      z-index: 1;
      width: min(1780px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 74px 0 20px;
      display: grid;
      align-items: center;
    }

    .book-tabs {
      position: absolute;
      top: 82px;
      right: 28px;
      z-index: 8;
      display: flex;
      gap: 8px;
    }

    .book-tab {
      padding: 9px 14px;
      border: 1px solid rgba(255, 129, 177, 0.34);
      border-radius: 999px;
      background: rgba(11, 5, 8, 0.68);
      color: rgba(255, 255, 255, 0.72);
      cursor: pointer;
      font: 900 10px/1 "Archivo", sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .book-tab:hover,
    .book-tab.is-active {
      transform: translateY(-1px);
      background: #ff83b5;
      color: #17070d;
    }

    .book-stage {
      position: relative;
      width: 100%;
      min-height: min(82vw, 920px);
      display: grid;
      place-items: center;
      overflow: visible;
      contain: layout;
    }

    .book-stage::before {
      content: "";
      position: absolute;
      width: min(1640px, 94vw);
      height: min(900px, 60vw);
      border-radius: 48%;
      background:
        radial-gradient(ellipse at center, rgba(255, 93, 157, 0.28), transparent 62%),
        radial-gradient(ellipse at center, rgba(255, 205, 160, 0.1), transparent 38%);
      filter: blur(24px);
      transform: translateY(34px);
      pointer-events: none;
    }

    .book-stage::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 4%;
      height: 54px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.78);
      filter: blur(22px);
      pointer-events: none;
    }

    .page-flip-shell {
      position: relative;
      z-index: 2;
      width: min(1520px, 88vw);
      height: min(860px, 56vw);
      min-height: 760px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .page-flip-shell::before,
    .page-flip-shell::after {
      content: "";
      position: absolute;
      top: 16px;
      bottom: 16px;
      width: 52px;
      border: 1px solid rgba(255, 204, 222, 0.22);
      background:
        repeating-linear-gradient(90deg, rgba(255, 220, 190, 0.12) 0 2px, rgba(0, 0, 0, 0.18) 2px 5px),
        linear-gradient(180deg, rgba(255, 210, 174, 0.44), rgba(40, 18, 18, 0.55));
      box-shadow: inset 0 0 12px rgba(255, 218, 179, 0.18);
      pointer-events: none;
    }

    .page-flip-shell::before {
      left: -18px;
      border-radius: 18px 0 0 18px;
    }

    .page-flip-shell::after {
      right: -18px;
      border-radius: 0 18px 18px 0;
    }

    .page-flip-book {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 34px 74px rgba(0, 0, 0, 0.62));
    }

    .book-physical-page {
      position: relative;
      overflow: hidden;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.038), transparent 12%, transparent 87%, rgba(0, 0, 0, 0.22)),
        radial-gradient(circle at 50% 10%, rgba(255, 109, 166, 0.12), transparent 23rem),
        linear-gradient(90deg, #171015, #24141c 48%, #120b0f);
      border: 1px solid rgba(255, 154, 192, 0.22);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
    }

    .book-physical-page::before {
      content: "";
      position: absolute;
      inset: 18px;
      z-index: 2;
      pointer-events: none;
      border: 1px solid rgba(255, 160, 197, 0.18);
      border-radius: 12px;
    }

    .book-physical-page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 90% 12%, rgba(255, 128, 181, 0.12), transparent 12rem),
        radial-gradient(circle at 8% 86%, rgba(255, 128, 181, 0.09), transparent 14rem);
      mix-blend-mode: screen;
    }

    .book-physical-page.--left {
      border-radius: 22px 0 0 22px;
      box-shadow: inset -44px 0 62px rgba(0, 0, 0, 0.42);
    }

    .book-physical-page.--right {
      border-radius: 0 22px 22px 0;
      box-shadow: inset 44px 0 62px rgba(0, 0, 0, 0.42);
    }

    .book-left-page,
    .book-right-page {
      position: relative;
      z-index: 3;
      min-height: 100%;
      padding: clamp(34px, 3.8vw, 62px);
    }

    .book-left-page {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(14px, 1.5vw, 22px);
    }

    .book-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ff85b8;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .book-kicker::before,
    .book-title-mark {
      content: "";
      width: 12px;
      height: 12px;
      background: currentColor;
      clip-path: polygon(50% 0, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      filter: drop-shadow(0 0 10px rgba(255, 116, 170, 0.55));
    }

    .left-title {
      margin: 12px 0 8px;
      color: #fff2f7;
      font-family: "Playfair Display", serif;
      font-size: clamp(44px, 4.5vw, 74px);
      font-weight: 600;
      line-height: 0.92;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .left-title span,
    .profile-name span {
      color: #ff87b9;
    }

    .title-rule {
      width: min(430px, 80%);
      height: 1px;
      margin: 14px 0;
      background: linear-gradient(90deg, #ff87b9, rgba(255, 205, 160, 0.68), transparent);
    }

    .book-left-page p {
      max-width: 470px;
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
      font-size: 15px;
    }

    .profile-photo-frame {
      position: relative;
      align-self: center;
      width: min(100%, 640px);
      margin: 0 auto;
      aspect-ratio: 1.42;
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(255, 207, 158, 0.55);
      background:
        linear-gradient(135deg, rgba(255, 198, 120, 0.32), transparent 18%, transparent 82%, rgba(255, 128, 181, 0.24)),
        rgba(0, 0, 0, 0.24);
      box-shadow: 0 0 0 1px rgba(255, 128, 181, 0.14), 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    .profile-photo-frame::before,
    .profile-photo-frame::after {
      content: "✿";
      position: absolute;
      z-index: 4;
      color: #ff8dbc;
      font-size: 34px;
      text-shadow: 0 0 18px rgba(255, 132, 182, 0.55);
    }

    .profile-photo-frame::before {
      right: -18px;
      top: -18px;
    }

    .profile-photo-frame::after {
      left: -10px;
      bottom: -20px;
    }

    .profile-photo {
      appearance: none;
      border: 0;
      padding: 0;
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 13px;
      background:
        radial-gradient(circle at 50% 23%, rgba(255, 130, 183, 0.6), transparent 14%),
        radial-gradient(ellipse at 50% 74%, rgba(255, 130, 183, 0.36), transparent 32%),
        linear-gradient(180deg, rgba(255, 116, 170, 0.18), rgba(0, 0, 0, 0.1)),
        #0a0507;
    }

    button.profile-photo {
      cursor: zoom-in;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    button.profile-photo:hover,
    button.profile-photo:focus-visible {
      transform: scale(1.012);
      box-shadow: 0 0 0 1px rgba(255, 135, 185, 0.42), 0 18px 48px rgba(255, 105, 164, 0.12);
      filter: saturate(1.06) brightness(1.04);
      outline: none;
    }

    .profile-photo:not(:has(img))::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 15%;
      width: 25%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 45% 35%, rgba(255, 181, 210, 0.72), rgba(255, 105, 164, 0.34) 58%, rgba(255, 105, 164, 0.05) 72%);
      filter: blur(0.5px);
      box-shadow: 0 0 62px rgba(255, 105, 164, 0.44);
    }

    .profile-photo:not(:has(img))::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -3%;
      width: 54%;
      height: 50%;
      border-radius: 46% 46% 14% 14%;
      transform: translateX(-50%);
      background:
        radial-gradient(ellipse at 50% 18%, rgba(255, 140, 186, 0.5), transparent 42%),
        linear-gradient(180deg, rgba(255, 105, 164, 0.34), rgba(65, 18, 37, 0.24) 72%, transparent);
      filter: blur(0.5px);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: rgba(10, 5, 7, 0.84);
      pointer-events: none;
    }

    .book-lightbox-open {
      overflow: hidden;
    }

    .book-lightbox[hidden] {
      display: none;
    }

    .book-lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 56px);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 105, 164, 0.16), transparent 42%),
        rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(14px);
    }

    .book-lightbox img {
      max-width: min(96vw, 1480px);
      max-height: min(88vh, 920px);
      object-fit: contain;
      border-radius: 18px;
      border: 1px solid rgba(255, 135, 185, 0.36);
      background: #09070a;
      box-shadow: 0 34px 120px rgba(0, 0, 0, 0.72), 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .book-lightbox-close {
      position: fixed;
      top: clamp(14px, 3vw, 34px);
      right: clamp(14px, 3vw, 34px);
      z-index: 2;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 135, 185, 0.48);
      background: rgba(12, 7, 11, 0.82);
      color: #fff;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.42);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .book-lightbox-close:hover,
    .book-lightbox-close:focus-visible {
      transform: translateY(-2px) scale(1.04);
      border-color: rgba(255, 135, 185, 0.86);
      background: #ff87b9;
      color: #17080f;
      outline: none;
    }

    .profile-empty {
      position: absolute;
      inset: auto 22px 22px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-align: center;
      text-transform: uppercase;
    }

    .image-label {
      text-align: center;
      color: rgba(255, 255, 255, 0.56);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .book-right-page {
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .profile-role {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      color: #ff89b9;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .profile-name {
      position: relative;
      margin: 0;
      color: #e9dde0;
      font-family: "Playfair Display", serif;
      font-size: clamp(58px, 5vw, 94px);
      font-weight: 500;
      line-height: 0.92;
      text-transform: uppercase;
    }

    .profile-name::after {
      content: attr(data-script);
      position: absolute;
      left: 22%;
      top: 8%;
      color: rgba(255, 255, 255, 0.07);
      font-family: "Playfair Display", serif;
      font-size: 1.18em;
      font-style: italic;
      text-transform: none;
      pointer-events: none;
    }

    .profile-quote {
      margin: 0;
      max-width: 610px;
      color: rgba(255, 255, 255, 0.85);
      font: 500 clamp(19px, 1.6vw, 26px)/1.38 "Playfair Display", serif;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .profile-info,
    .social-panel,
    .about-panel {
      border: 1px solid rgba(255, 139, 185, 0.22);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018));
      box-shadow: inset 0 0 22px rgba(255, 105, 164, 0.035);
    }

    .profile-info {
      min-height: 62px;
      padding: 11px 16px;
    }

    .profile-info span,
    .social-panel span,
    .about-panel span {
      display: block;
      color: #ff93c1;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .profile-info b {
      display: block;
      margin-top: 7px;
      color: #fff;
      font-size: 15px;
    }

    .social-panel {
      padding: 0 22px 11px;
      text-align: center;
    }

    .social-panel span {
      display: inline-block;
      padding: 0 12px;
      transform: translateY(-50%);
      background: #1f1017;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 4vw, 58px);
    }

    .social-links a {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 139, 185, 0.38);
      border-radius: 50%;
      color: #ff93c1;
      font-size: 20px;
      font-weight: 900;
      text-decoration: none;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease;
    }

    .social-links a:hover {
      transform: translateY(-3px);
      background: #ff8fbe;
      color: #16070d;
    }

    .about-panel {
      padding: 12px 18px 14px;
    }

    .about-panel p {
      margin: 8px 0 0;
      max-width: 590px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1.45;
    }

    .book-arrow {
      position: absolute;
      z-index: 6;
      top: 53%;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 213, 227, 0.22);
      border-radius: 50%;
      background: rgba(10, 5, 7, 0.58);
      color: #fff;
      cursor: pointer;
      font-size: 34px;
      line-height: 1;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.34);
      transition: transform 180ms ease, background 180ms ease, color 180ms ease;
    }

    .book-arrow:hover:not(:disabled) {
      transform: translateY(-50%) scale(1.05);
      background: #ff8fbe;
      color: #14070c;
    }

    .book-arrow:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .book-arrow.prev {
      left: calc(50% - min(760px, 44vw) - 30px);
      transform: translateY(-50%);
    }

    .book-arrow.next {
      right: calc(50% - min(760px, 44vw) - 30px);
      transform: translateY(-50%);
    }

    .book-dots {
      position: absolute;
      z-index: 7;
      left: 50%;
      bottom: max(10px, 2vh);
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      padding: 12px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(12px);
    }

    .book-dots button {
      width: 10px;
      height: 10px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
    }

    .book-dots button.is-active {
      border-color: #ff8fbe;
      background: #ff8fbe;
      box-shadow: 0 0 12px rgba(255, 143, 190, 0.68);
    }

    @media (max-width: 980px) {
      .book-main { padding-top: 96px; }
      .book-tabs { position: relative; inset: auto; justify-content: center; margin-bottom: 14px; }
      .book-stage { min-height: 820px; }
      .page-flip-shell { width: min(100%, 860px); height: 760px; min-height: 760px; }
      .book-left-page,
      .book-right-page { padding: 28px; }
      .profile-photo-frame { width: min(100%, 560px); }
      .book-arrow.prev { left: 12px; }
      .book-arrow.next { right: 12px; }
    }

    @media (max-width: 600px) {
      .page-flip-shell { height: 600px; min-height: 600px; }
      .left-title { font-size: 38px; }
      .profile-name { font-size: 42px; }
      .profile-grid { grid-template-columns: 1fr; }
      .social-links { gap: 18px; }
      .social-links a { width: 48px; height: 48px; font-size: 22px; }
      .book-arrow { width: 42px; height: 42px; font-size: 28px; }
      .book-dots { gap: 8px; padding: 10px 14px; }
    }
  </style>
</head>

  <main class="book-main">
    <div class="book-tabs" role="tablist" aria-label="Escolha o livro">
      <button class="book-tab is-active" type="button" data-book-tab="ambassadors">Embaixadores</button>
      <button class="book-tab" type="button" data-book-tab="influencers">Influenciadores</button>
    </div>

    <section class="book-stage" aria-live="polite">
      <div class="page-flip-shell" data-page-flip-shell>
        <div class="page-flip-book" data-page-flip></div>
      </div>
      <button class="book-arrow prev" type="button" data-book-prev aria-label="Pagina anterior">&#8249;</button>
      <button class="book-arrow next" type="button" data-book-next aria-label="Proxima pagina">&#8250;</button>
      <div class="book-dots" data-book-dots aria-label="Paginas do livro"></div>
    </section>
  </main>

  <div class="book-lightbox" data-book-lightbox hidden>
    <button class="book-lightbox-close" type="button" data-book-lightbox-close aria-label="Fechar imagem">&times;</button>
    <img data-book-lightbox-image alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  <script>
    const fallbackBookCards = [
      ["ambassadors", "Luna Vex", "Embaixadora", "Represento a Blossom com orgulho e autenticidade.", "2023", "Global"],
      ["ambassadors", "Kai Mori", "Embaixador", "Moda e atitude andam juntas.", "2023", "Nacional"],
      ["ambassadors", "Nikki Bloom", "Embaixadora", "Cada peca conta uma historia.", "2024", "Global"],
      ["ambassadors", "Drey Saint", "Embaixador", "O estilo e uma extensao de quem somos.", "2024", "Nacional"],
      ["ambassadors", "Mila Knox", "Embaixadora", "Destaque-se com naturalidade.", "2024", "Global"],
      ["ambassadors", "Zion Park", "Embaixador", "Atitude em cada detalhe.", "2024", "Nacional"],
      ["influencers", "@babyxgeon", "Creator", "Criando conteudo com estilo Blossom.", "2024", "Digital"],
      ["influencers", "@str4wb3rry", "Creator", "Doce, forte e Blossom.", "2024", "Digital"],
      ["influencers", "@gobbimoon", "Creator", "A lua ilumina, mas o estilo brilha.", "2024", "Nacional"],
      ["influencers", "@otaviokim", "Creator", "Autenticidade em cada post.", "2024", "Nacional"],
      ["influencers", "@dudamills", "Creator", "Viva sua melhor versao.", "2024", "Global"],
      ["influencers", "@heartzui", "Creator", "Com o coracao na Blossom.", "2024", "Nacional"],
    ].map(([section, name, role, quote, since, influence], position) => ({ id: `${section}-${position}`, section, name, role, quote, since, influence, images: [], image: "", position }));

    const fallbackBookSettings = {
      titleLine1: "Livro da",
      titleLine2: "Comunidade",
      ambassadorsIntro: "Conheca os embaixadores e influenciadores que fazem parte da historia da Blossom. Cada pagina guarda essencia, conexao e inspiracao.",
      influencersIntro: "Conheca os influenciadores que espalham a essencia Blossom, criando conexao, estilo e presenca em cada conteudo.",
      imageLabel: "Imagem preparada",
    };

    const state = {
      section: new URLSearchParams(location.search).get("aba") === "influencers" ? "influencers" : "ambassadors",
      cards: fallbackBookCards,
      settings: fallbackBookSettings,
      pageFlip: null,
      ready: false,
    };

    const flipShell = document.querySelector("[data-page-flip-shell]");
    const dotsTarget = document.querySelector("[data-book-dots]");
    let flipTarget = document.querySelector("[data-page-flip]");

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[char]));
    }

    function itemImages(item) {
      if (Array.isArray(item?.images) && item.images.length) return item.images.filter(Boolean);
      return item?.image ? [item.image] : [];
    }

    function normalizeCard(card, position) {
      const section = card.section === "influencers" ? "influencers" : "ambassadors";
      const images = itemImages(card);
      return {
        id: card.id || `${section}-${position}`,
        section,
        name: card.name || "Blossom",
        role: card.role || (section === "influencers" ? "Creator" : "Embaixador"),
        quote: card.quote || (section === "influencers" ? "Criando conteudo com estilo Blossom." : "Represento a Blossom com orgulho."),
        since: card.since || "2024",
        influence: card.influence || (section === "influencers" ? "Digital" : "Roleplay"),
        about: card.about || card.bio || "Apaixonada por moda e autenticidade, essa pessoa representa a essencia Blossom dentro da comunidade.",
        instagram: card.instagram || "#",
        tiktok: card.tiktok || "#",
        pinterest: card.pinterest || "#",
        images,
        image: images[0] || "",
        position: Number(card.position ?? position),
      };
    }

    async function loadBookCards() {
      try {
        if (location.protocol.startsWith("http")) {
          const response = await fetch("/api/store");
          if (response.ok) {
            const store = await response.json();
            const cards = store?.taxonomies?.featuredCards;
            const settings = store?.taxonomies?.bookSettings;
            if (Array.isArray(cards) && cards.length) {
              state.cards = cards.map(normalizeCard);
              if (settings && typeof settings === "object") state.settings = { ...fallbackBookSettings, ...settings };
              return;
            }
          }
        }
        const saved = JSON.parse(localStorage.getItem("blossom-featured-cards") || "[]");
        if (Array.isArray(saved) && saved.length) state.cards = saved.map(normalizeCard);
        const savedSettings = JSON.parse(localStorage.getItem("blossom-book-settings") || "null");
        if (savedSettings && typeof savedSettings === "object") state.settings = { ...fallbackBookSettings, ...savedSettings };
      } catch (error) {
        console.warn("Nao foi possivel carregar o livro.", error);
      }
    }

    function currentCards() {
      return state.cards
        .filter((card) => card.section === state.section)
        .sort((a, b) => Number(a.position || 0) - Number(b.position || 0));
    }

    function introText() {
      return state.section === "influencers"
        ? state.settings.influencersIntro
        : state.settings.ambassadorsIntro;
    }

    function leftPageMarkup(card, index) {
      const image = card.image ? `<img src="${card.image}" alt="${escapeHtml(card.name)}">` : '<div class="profile-empty">Imagem preparada</div>';
      const photo = card.image
        ? `<button class="profile-photo" type="button" data-book-lightbox-src="${escapeHtml(card.image)}" data-book-lightbox-alt="${escapeHtml(card.name)}" aria-label="Expandir imagem de ${escapeHtml(card.name)}">${image}</button>`
        : `<div class="profile-photo">${image}</div>`;
      return `
        <section class="book-physical-page --left">
          <div class="book-left-page">
            <div>
              <span class="book-kicker">Arquivo Blossom</span>
              <h1 class="left-title">${escapeHtml(state.settings.titleLine1)}<br><span>${escapeHtml(state.settings.titleLine2)}</span></h1>
              <div class="title-rule"></div>
              <p>${introText()}</p>
            </div>
            <div class="profile-photo-frame">
              ${photo}
            </div>
            <div class="image-label">${escapeHtml(state.settings.imageLabel)}</div>
          </div>
        </section>
      `;
    }

    function rightPageMarkup(card) {
      const nameParts = String(card.name || "Blossom").replace("@", "").split(/\s+/);
      const first = escapeHtml(nameParts[0] || card.name);
      const rest = escapeHtml(nameParts.slice(1).join(" ") || "");
      const displayName = rest ? `${first}<br><span>${rest}</span>` : first;
      return `
        <section class="book-physical-page --right">
          <div class="book-right-page">
            <span class="profile-role"><i class="book-title-mark"></i><span>${escapeHtml(card.role)}</span></span>
            <h2 class="profile-name" data-script="${escapeHtml(card.name)}">${displayName}</h2>
            <p class="profile-quote">"${escapeHtml(card.quote)}"</p>
            <div class="profile-grid">
              <div class="profile-info"><span>Nome</span><b>${escapeHtml(card.name)}</b></div>
              <div class="profile-info"><span>Cargo</span><b>${escapeHtml(card.role)}</b></div>
              <div class="profile-info"><span>Desde</span><b>${escapeHtml(card.since)}</b></div>
              <div class="profile-info"><span>Influencia</span><b>${escapeHtml(card.influence)}</b></div>
            </div>
            <div class="social-panel">
              <span>Redes sociais</span>
              <div class="social-links">
                <a href="${escapeHtml(card.instagram)}" aria-label="Instagram">◎</a>
                <a href="${escapeHtml(card.tiktok)}" aria-label="TikTok">♪</a>
                <a href="${escapeHtml(card.pinterest)}" aria-label="Pinterest">p</a>
              </div>
            </div>
            <div class="about-panel">
              <span>Sobre ela</span>
              <p>${escapeHtml(card.about)}</p>
            </div>
          </div>
        </section>
      `;
    }

    function buildPages() {
      const cards = currentCards();
      const safeCards = cards.length ? cards : [normalizeCard({}, 0)];
      flipTarget.innerHTML = safeCards.map((card, index) => `${leftPageMarkup(card, index)}${rightPageMarkup(card)}`).join("");
      renderDots();
    }

    function resetFlipTarget() {
      if (state.pageFlip) {
        try { state.pageFlip.destroy(); } catch (error) { console.warn("Nao foi possivel destruir o livro anterior.", error); }
        state.pageFlip = null;
      }
      flipShell.innerHTML = '<div class="page-flip-book" data-page-flip></div>';
      flipTarget = flipShell.querySelector("[data-page-flip]");
    }

    function currentPersonIndex() {
      if (!state.pageFlip || !state.ready) return 0;
      return Math.max(0, Math.floor(state.pageFlip.getCurrentPageIndex() / 2));
    }

    function updateBookControls() {
      if (!state.pageFlip || !state.ready) return;
      const index = currentPersonIndex();
      const cards = currentCards();
      const maxIndex = Math.max(0, cards.length - 1);
      document.querySelector("[data-book-prev]").disabled = index <= 0;
      document.querySelector("[data-book-next]").disabled = index >= maxIndex;
      dotsTarget.querySelectorAll("button").forEach((dot, dotIndex) => dot.classList.toggle("is-active", dotIndex === index));
    }

    function renderDots() {
      const cards = currentCards();
      dotsTarget.innerHTML = cards.map((_, index) => `<button type="button" data-book-dot="${index}" aria-label="Ir para pagina ${index + 1}"></button>`).join("");
      dotsTarget.querySelectorAll("[data-book-dot]").forEach((button) => {
        button.addEventListener("click", () => {
          state.pageFlip?.flip(Number(button.dataset.bookDot) * 2);
        });
      });
    }

    function createPageFlip() {
      state.ready = false;
      resetFlipTarget();
      buildPages();
      if (!window.St?.PageFlip) return;
      state.pageFlip = new St.PageFlip(flipTarget, {
        width: 760,
        height: 860,
        size: "stretch",
        minWidth: 320,
        maxWidth: 760,
        minHeight: 520,
        maxHeight: 860,
        showCover: false,
        useMouseEvents: true,
        mobileScrollSupport: false,
        drawShadow: true,
        flippingTime: 1150,
        maxShadowOpacity: 0.62,
        startZIndex: 4,
      });
      state.pageFlip.loadFromHTML(flipTarget.querySelectorAll(".book-physical-page"));
      state.pageFlip.on("flip", updateBookControls);
      state.pageFlip.on("changeState", updateBookControls);
      state.ready = true;
      updateBookControls();
    }

    function setSection(section) {
      state.section = section;
      document.querySelectorAll("[data-book-tab]").forEach((tab) => tab.classList.toggle("is-active", tab.dataset.bookTab === section));
      history.replaceState(null, "", `livro.html?aba=${section}`);
      createPageFlip();
    }

    document.querySelector("[data-book-next]").addEventListener("click", () => {
      state.pageFlip?.flip(Math.min(currentPersonIndex() + 1, currentCards().length - 1) * 2);
    });

    document.querySelector("[data-book-prev]").addEventListener("click", () => {
      state.pageFlip?.flip(Math.max(currentPersonIndex() - 1, 0) * 2);
    });

    document.querySelectorAll("[data-book-tab]").forEach((tab) => {
      tab.addEventListener("click", () => setSection(tab.dataset.bookTab));
    });

    const lightbox = document.querySelector("[data-book-lightbox]");
    const lightboxImage = document.querySelector("[data-book-lightbox-image]");

    function openBookLightbox(src, alt) {
      if (!src) return;
      lightboxImage.src = src;
      lightboxImage.alt = alt || "Imagem do livro";
      lightbox.hidden = false;
      document.body.classList.add("book-lightbox-open");
    }

    function closeBookLightbox() {
      lightbox.hidden = true;
      lightboxImage.removeAttribute("src");
      lightboxImage.alt = "";
      document.body.classList.remove("book-lightbox-open");
    }

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-book-lightbox-src]");
      if (trigger) {
        event.preventDefault();
        event.stopPropagation();
        openBookLightbox(trigger.dataset.bookLightboxSrc, trigger.dataset.bookLightboxAlt);
        return;
      }

      if (!lightbox.hidden && (event.target === lightbox || event.target.closest("[data-book-lightbox-close]"))) {
        closeBookLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !lightbox.hidden) closeBookLightbox();
    });

    loadBookCards().then(() => setSection(state.section));
  </script>
  <script src="script.js"></script>
</body>
