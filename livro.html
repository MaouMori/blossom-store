<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#050305">
  <title>Blossom Store - Livro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .book-page-body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 75% 8%, rgba(255, 114, 167, 0.18), transparent 32rem),
        radial-gradient(circle at 18% 48%, rgba(122, 21, 54, 0.18), transparent 34rem),
        #050305;
      color: #fff;
      font-family: "Archivo", sans-serif;
      overflow-x: hidden;
    }

    .book-main {
      width: min(1620px, calc(100% - 34px));
      margin: 0 auto;
      padding: 128px 0 72px;
    }

    .book-intro {
      display: grid;
      grid-template-columns: minmax(260px, 0.75fr) minmax(320px, 1.25fr);
      gap: 34px;
      align-items: end;
      margin-bottom: 34px;
    }

    .book-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ff74aa;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .book-kicker::before,
    .book-title-mark {
      content: "";
      width: 14px;
      height: 14px;
      background: currentColor;
      clip-path: polygon(50% 0, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      filter: drop-shadow(0 0 12px rgba(255, 116, 170, 0.55));
    }

    .book-intro h1 {
      margin: 16px 0 14px;
      font-family: "Oswald", sans-serif;
      font-size: clamp(54px, 8vw, 126px);
      line-height: 0.88;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .book-intro p {
      max-width: 560px;
      margin: 0;
      color: rgba(255, 255, 255, 0.66);
      line-height: 1.75;
      font-size: 15px;
    }

    .book-tabs {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .book-tab {
      min-width: 188px;
      padding: 14px 22px;
      border: 1px solid rgba(255, 116, 170, 0.32);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      color: rgba(255, 255, 255, 0.74);
      cursor: pointer;
      font: 900 12px/1 "Archivo", sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .book-tab:hover,
    .book-tab.is-active {
      transform: translateY(-2px);
      background: #ff86b6;
      color: #1a0810;
      box-shadow: 0 14px 42px rgba(255, 116, 170, 0.22);
    }

    .book-stage {
      position: relative;
      min-height: clamp(720px, 56vw, 900px);
      padding: clamp(16px, 2.4vw, 42px);
      border: 1px solid rgba(255, 116, 170, 0.18);
      border-radius: 34px;
      background:
        radial-gradient(circle at 50% 102%, rgba(255, 116, 170, 0.16), transparent 28rem),
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.012));
      box-shadow: 0 52px 160px rgba(0, 0, 0, 0.58);
      overflow: visible;
    }

    .book-stage::after {
      content: "";
      position: absolute;
      left: 9%;
      right: 9%;
      bottom: 16px;
      height: 44px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.6);
      filter: blur(24px);
      pointer-events: none;
    }

    .page-flip-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      height: clamp(680px, 52vw, 860px);
      display: grid;
      place-items: center;
    }

    .page-flip-book {
      width: min(100%, 1440px);
      height: 100%;
      filter: drop-shadow(0 32px 64px rgba(0, 0, 0, 0.46));
    }

    .book-physical-page {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 13%, transparent 86%, rgba(0, 0, 0, 0.18)),
        radial-gradient(circle at 50% 12%, rgba(255, 116, 170, 0.12), transparent 23rem),
        linear-gradient(90deg, #10090d, #191014 48%, #0c0608);
      border: 1px solid rgba(255, 178, 205, 0.2);
      color: #fff;
    }

    .book-physical-page::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(255, 178, 205, 0.18);
      border-radius: 14px;
      pointer-events: none;
      z-index: 2;
    }

    .book-physical-page.--left {
      box-shadow: inset -46px 0 58px rgba(0, 0, 0, 0.36);
    }

    .book-physical-page.--right {
      box-shadow: inset 46px 0 58px rgba(0, 0, 0, 0.36);
    }

    .book-cover-page {
      display: grid;
      place-items: center;
      cursor: pointer;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.028) 0 1px, transparent 1px 10px),
        linear-gradient(135deg, rgba(255, 116, 170, 0.18), transparent 42%),
        linear-gradient(90deg, rgba(255, 116, 170, 0.2), transparent 12%),
        linear-gradient(180deg, #1a0910, #070305 58%, #13060b);
      box-shadow:
        inset 32px 0 44px rgba(0, 0, 0, 0.58),
        inset -12px 0 26px rgba(255, 116, 170, 0.08);
    }

    .book-cover-page::after {
      content: "";
      position: absolute;
      inset: 42px;
      border: 1px dashed rgba(255, 178, 205, 0.16);
      border-radius: 18px;
      pointer-events: none;
    }

    .cover-inner {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 36px;
    }

    .cover-inner::before,
    .cover-inner::after {
      content: "";
      position: absolute;
      left: 50%;
      width: min(560px, 76vw);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(255, 134, 182, 0.72), transparent);
    }

    .cover-inner::before { top: 12px; }
    .cover-inner::after { bottom: 12px; }

    .cover-flower {
      width: 104px;
      height: 104px;
      margin: 0 auto 26px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 116, 170, 0.1);
      color: #ff86b6;
      font-size: 56px;
      box-shadow: 0 0 70px rgba(255, 116, 170, 0.2);
    }

    .cover-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(54px, 7vw, 108px);
      line-height: 0.92;
      color: #fff2f7;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 0 28px rgba(255, 116, 170, 0.26);
    }

    .cover-subtitle {
      margin-top: 25px;
      color: #ff86b6;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 13px;
    }

    .cover-hint {
      margin-top: 38px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .book-photo-page,
    .book-profile-page,
    .book-empty-page {
      min-height: 100%;
      padding: clamp(34px, 4vw, 68px);
    }

    .book-photo-page {
      display: grid;
      place-items: center;
    }

    .profile-photo {
      position: relative;
      z-index: 1;
      width: min(100%, 570px);
      height: min(100%, 680px);
      min-height: 560px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 178, 205, 0.25);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 134, 182, 0.75) 0 7%, transparent 7.5%),
        radial-gradient(circle at 50% 34%, rgba(255, 116, 170, 0.52) 0 13%, transparent 13.5%),
        linear-gradient(180deg, rgba(255, 116, 170, 0.24), rgba(255, 116, 170, 0.02) 72%),
        #080405;
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-empty {
      position: absolute;
      inset: auto 24px 28px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .profile-panel {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 26px;
      min-height: 100%;
      align-content: center;
    }

    .profile-role {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: #ff86b6;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .profile-name {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(50px, 5.4vw, 92px);
      line-height: 0.92;
      color: #fff2f7;
      text-transform: uppercase;
    }

    .profile-quote {
      margin: 0;
      max-width: 570px;
      color: rgba(255, 255, 255, 0.72);
      font: 600 clamp(18px, 2.15vw, 28px)/1.45 "Playfair Display", serif;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 6px;
    }

    .profile-info {
      min-height: 94px;
      padding: 16px;
      border: 1px solid rgba(255, 178, 205, 0.16);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
    }

    .profile-info span {
      display: block;
      color: #ff86b6;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .profile-info b {
      display: block;
      margin-top: 8px;
      color: #fff;
      font-size: 15px;
    }

    .book-gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .book-gallery div {
      aspect-ratio: 1;
      border: 1px solid rgba(255, 178, 205, 0.18);
      border-radius: 10px;
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 134, 182, 0.58), transparent 18%),
        linear-gradient(180deg, rgba(255, 116, 170, 0.15), transparent),
        #080405;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .book-empty-page {
      display: grid;
      place-items: center;
      text-align: center;
      color: rgba(255, 255, 255, 0.58);
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 920px) {
      .book-main { padding-top: 110px; }
      .book-intro { grid-template-columns: 1fr; }
      .book-tabs { justify-content: flex-start; }
      .book-stage { min-height: 720px; padding: 12px; }
      .page-flip-shell { height: 690px; }
      .book-photo-page,
      .book-profile-page,
      .book-empty-page { padding: 28px; }
      .profile-photo { min-height: 430px; }
      .profile-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .book-main { width: min(100% - 20px, 1620px); }
      .book-tab { min-width: 100%; }
      .book-stage { min-height: 620px; }
      .page-flip-shell { height: 590px; }
      .book-gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cover-title { font-size: 48px; }
      .profile-name { font-size: 42px; }
    }
  </style>
</head>
<body class="book-page-body home-editorial">
  <header class="editorial-header">
    <a class="editorial-corner-logo" href="index.html" aria-label="Blossom Store">&#10047;</a>
    <nav class="editorial-nav" aria-label="Navegacao principal">
      <a href="index.html">Inicio</a>
      <a class="active" href="livro.html">Livro</a>
      <a href="colecoes.html">Colecoes</a>
      <a href="loja.html">Loja</a>
      <a href="sobre.html">Sobre nos</a>
      <a href="contato.html">Contato</a>
    </nav>
    <button class="mobile-menu-toggle" type="button" aria-label="Abrir menu" data-mobile-menu-toggle>&#9776;</button>
    <div class="mobile-nav-overlay" data-mobile-nav-overlay></div>
    <nav class="mobile-nav" aria-label="Navegacao mobile" data-mobile-nav>
      <button class="mobile-nav-close" type="button" aria-label="Fechar menu" data-mobile-nav-close>&times;</button>
      <a href="index.html">Inicio</a>
      <a class="active" href="livro.html">Livro</a>
      <a href="colecoes.html">Colecoes</a>
      <a href="loja.html">Loja</a>
      <a href="sobre.html">Sobre nos</a>
      <a href="contato.html">Contato</a>
    </nav>
    <div class="editorial-utilities">
      <span>Claro</span>
      <button class="theme-pill" type="button" aria-label="Alternar tema" data-theme-toggle><i></i></button>
      <span>Escuro</span>
    </div>
  </header>

  <main class="book-main">
    <section class="book-intro">
      <div>
        <span class="book-kicker">Arquivo Blossom</span>
        <h1>Livro da<br>comunidade</h1>
        <p>Abra o livro para conhecer os embaixadores e influenciadores da Blossom. Cada pagina pode ser criada, editada e removida pelo painel admin.</p>
      </div>
      <div class="book-tabs" role="tablist" aria-label="Escolha o livro">
        <button class="book-tab is-active" type="button" data-book-tab="ambassadors">Embaixadores</button>
        <button class="book-tab" type="button" data-book-tab="influencers">Influenciadores</button>
      </div>
    </section>

    <section class="book-stage" aria-live="polite">
      <div class="page-flip-shell" data-page-flip-shell>
        <div class="page-flip-book" data-page-flip></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  <script>
    const fallbackBookCards = [
      ["ambassadors", "Luna Vex", "Embaixadora", "Represento a Blossom com orgulho e autenticidade.", "2023", "Global"],
      ["ambassadors", "Kai Mori", "Embaixador", "Moda e atitude andam juntas.", "2023", "Nacional"],
      ["ambassadors", "Nikki Bloom", "Embaixadora", "Cada peca conta uma historia.", "2024", "Global"],
      ["ambassadors", "Drey Saint", "Embaixador", "O estilo e uma extensao de quem somos.", "2024", "Nacional"],
      ["ambassadors", "Mila Knox", "Embaixadora", "Destaque-se com naturalidade.", "2024", "Global"],
      ["ambassadors", "Zion Park", "Embaixador", "Atitude em cada detalhe.", "2024", "Nacional"],
      ["influencers", "@babyxgeon", "Creator", "Criando conteudo com estilo Blossom.", "2024", "Digital"],
      ["influencers", "@str4wb3rry", "Creator", "Doce, forte e Blossom.", "2024", "Digital"],
      ["influencers", "@gobbimoon", "Creator", "A lua ilumina, mas o estilo brilha.", "2024", "Nacional"],
      ["influencers", "@otaviokim", "Creator", "Autenticidade em cada post.", "2024", "Nacional"],
      ["influencers", "@dudamills", "Creator", "Viva sua melhor versao.", "2024", "Global"],
      ["influencers", "@heartzui", "Creator", "Com o coracao na Blossom.", "2024", "Nacional"],
    ].map(([section, name, role, quote, since, influence], position) => ({ id: `${section}-${position}`, section, name, role, quote, since, influence, images: [], image: "", position }));

    const state = {
      section: new URLSearchParams(location.search).get("aba") === "influencers" ? "influencers" : "ambassadors",
      cards: fallbackBookCards,
      pageFlip: null,
      ready: false,
    };

    const flipShell = document.querySelector("[data-page-flip-shell]");
    let flipTarget = document.querySelector("[data-page-flip]");

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[char]));
    }

    function itemImages(item) {
      if (Array.isArray(item?.images) && item.images.length) return item.images.filter(Boolean);
      return item?.image ? [item.image] : [];
    }

    function normalizeCard(card, position) {
      const section = card.section === "influencers" ? "influencers" : "ambassadors";
      const images = itemImages(card);
      return {
        id: card.id || `${section}-${position}`,
        section,
        name: card.name || "Blossom",
        role: card.role || (section === "influencers" ? "Creator" : "Embaixador"),
        quote: card.quote || (section === "influencers" ? "Criando conteudo com estilo Blossom." : "Represento a Blossom com orgulho."),
        since: card.since || "2024",
        influence: card.influence || (section === "influencers" ? "Digital" : "Roleplay"),
        images,
        image: images[0] || "",
        position: Number(card.position ?? position),
      };
    }

    async function loadBookCards() {
      try {
        if (location.protocol.startsWith("http")) {
          const response = await fetch("/api/store");
          if (response.ok) {
            const store = await response.json();
            const cards = store?.taxonomies?.featuredCards;
            if (Array.isArray(cards) && cards.length) {
              state.cards = cards.map(normalizeCard);
              return;
            }
          }
        }
        const saved = JSON.parse(localStorage.getItem("blossom-featured-cards") || "[]");
        if (Array.isArray(saved) && saved.length) state.cards = saved.map(normalizeCard);
      } catch (error) {
        console.warn("Nao foi possivel carregar o livro.", error);
      }
    }

    function currentCards() {
      return state.cards
        .filter((card) => card.section === state.section)
        .sort((a, b) => Number(a.position || 0) - Number(b.position || 0));
    }

    function coverPageMarkup() {
      const subtitle = state.section === "influencers" ? "Conheca nossos influenciadores" : "Conheca nossos embaixadores";
      return `
        <section class="book-physical-page book-cover-page" data-cover-page>
          <div class="cover-inner">
            <div class="cover-flower">&#10047;</div>
            <div class="cover-title">Blossom<br>Store</div>
            <div class="cover-subtitle">${subtitle}</div>
            <div class="cover-hint">Use a ponta direita para abrir</div>
          </div>
        </section>
      `;
    }

    function photoPageMarkup(card) {
      const image = card.image ? `<img src="${card.image}" alt="${escapeHtml(card.name)}">` : '<div class="profile-empty">Imagem preparada</div>';
      return `
        <section class="book-physical-page --left">
          <div class="book-photo-page">
            <div class="profile-photo">${image}</div>
          </div>
        </section>
      `;
    }

    function profilePageMarkup(card) {
      const images = itemImages(card);
      const gallery = (images.length ? images : ["", "", ""]).slice(0, 6).map((image) => (
        `<div ${image ? `style="background-image:url('${image}')"` : ""}></div>`
      )).join("");
      return `
        <section class="book-physical-page --right">
          <div class="book-profile-page">
            <div class="profile-panel">
              <span class="profile-role"><i class="book-title-mark"></i><span>${escapeHtml(card.role)}</span></span>
              <h2 class="profile-name">${escapeHtml(card.name)}</h2>
              <p class="profile-quote">"${escapeHtml(card.quote)}"</p>
              <div class="profile-grid">
                <div class="profile-info"><span>Nome</span><b>${escapeHtml(card.name)}</b></div>
                <div class="profile-info"><span>Cargo</span><b>${escapeHtml(card.role)}</b></div>
                <div class="profile-info"><span>Desde</span><b>${escapeHtml(card.since)}</b></div>
                <div class="profile-info"><span>Influencia</span><b>${escapeHtml(card.influence)}</b></div>
              </div>
              <div class="book-gallery">${gallery}</div>
            </div>
          </div>
        </section>
      `;
    }

    function emptyBackPageMarkup() {
      return '<section class="book-physical-page book-empty-page"><span>Fim do livro Blossom</span></section>';
    }

    function buildPages() {
      const cards = currentCards();
      const pages = [coverPageMarkup()];
      cards.forEach((card) => {
        pages.push(photoPageMarkup(card));
        pages.push(profilePageMarkup(card));
      });
      if (pages.length % 2 === 0) pages.push(emptyBackPageMarkup());
      flipTarget.innerHTML = pages.join("");
    }

    function resetFlipTarget() {
      if (state.pageFlip) {
        try { state.pageFlip.destroy(); } catch (error) { console.warn("Nao foi possivel destruir o livro anterior.", error); }
        state.pageFlip = null;
      }
      flipShell.innerHTML = '<div class="page-flip-book" data-page-flip></div>';
      flipTarget = flipShell.querySelector("[data-page-flip]");
    }

    function createPageFlip() {
      state.ready = false;
      resetFlipTarget();
      buildPages();
      if (!window.St?.PageFlip) {
        return;
      }
      state.pageFlip = new St.PageFlip(flipTarget, {
        width: 720,
        height: 860,
        size: "stretch",
        minWidth: 320,
        maxWidth: 720,
        minHeight: 520,
        maxHeight: 860,
        showCover: true,
        useMouseEvents: true,
        mobileScrollSupport: false,
        drawShadow: true,
        flippingTime: 1150,
        maxShadowOpacity: 0.62,
        startZIndex: 4,
      });
      state.pageFlip.loadFromHTML(flipTarget.querySelectorAll(".book-physical-page"));
      state.ready = true;
    }

    function setSection(section) {
      state.section = section;
      document.querySelectorAll("[data-book-tab]").forEach((tab) => tab.classList.toggle("is-active", tab.dataset.bookTab === section));
      history.replaceState(null, "", `livro.html?aba=${section}`);
      createPageFlip();
    }

    document.querySelectorAll("[data-book-tab]").forEach((tab) => {
      tab.addEventListener("click", () => setSection(tab.dataset.bookTab));
    });

    loadBookCards().then(() => setSection(state.section));
  </script>
  <script src="script.js"></script>
</body>
</html>
