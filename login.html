<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#1a0b12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Login - Blossom Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">
  <main class="login-page auth-page">
    <section class="login-card auth-card">
      <a class="brand" href="index.html">
        <span class="brand-mark">✿</span>
        <span>
          <b>BLOSSOM</b>
          <small>STORE</small>
        </span>
      </a>

      <button class="mobile-menu-toggle" type="button" aria-label="Abrir menu" data-mobile-menu-toggle>☰</button>

      <div class="mobile-nav-overlay" data-mobile-nav-overlay></div>
      <nav class="mobile-nav" aria-label="Navegação mobile" data-mobile-nav>
        <button class="mobile-nav-close" type="button" aria-label="Fechar menu" data-mobile-nav-close>✕</button>
        <a href="index.html">Home</a>
        <a href="colecoes.html">Coleções</a>
        <a href="loja.html">Loja</a>
        <a href="sobre.html">Sobre nós</a>
      </nav>

      <div>
        <span class="eyebrow">Conta Blossom</span>
        <h1>Acesse sua conta</h1>
        <p>Entre, crie uma conta ou redefina sua senha para continuar no site.</p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="active" type="button" data-auth-tab="login">Entrar</button>
        <button type="button" data-auth-tab="register">Criar conta</button>
        <button type="button" data-auth-tab="forgot">Esqueci a senha</button>
      </div>

      <a class="discord-login" href="/api/discord-auth?action=start">Entrar com Discord</a>

      <form data-auth-form="login">
        <label>
          Usuário
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label class="password-field">
          Senha
          <span>
            <input type="password" name="password" autocomplete="current-password" required>
            <button type="button" data-toggle-password>Ver</button>
          </span>
        </label>
        <button class="auth-submit" type="submit">
          <span>Entrar</span>
          <small>A conta admin abre o painel automaticamente</small>
        </button>
      </form>

      <form data-auth-form="register" hidden>
        <label>
          Usuário
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label class="password-field">
          Senha
          <span>
            <input type="password" name="password" autocomplete="new-password" required>
            <button type="button" data-toggle-password>Ver</button>
          </span>
        </label>
        <button class="auth-submit" type="submit">
          <span>Criar conta</span>
          <small>Contas novas entram como cliente</small>
        </button>
      </form>

      <form data-auth-form="forgot" hidden>
        <label>
          Usuário
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label class="password-field">
          Nova senha
          <span>
            <input type="password" name="password" autocomplete="new-password" required>
            <button type="button" data-toggle-password>Ver</button>
          </span>
        </label>
        <button class="auth-submit" type="submit">
          <span>Redefinir senha</span>
          <small>Use o usuário cadastrado para trocar a senha</small>
        </button>
      </form>

      <p class="auth-message" data-auth-message></p>
      <a class="text-link" href="index.html">Voltar para o site</a>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
